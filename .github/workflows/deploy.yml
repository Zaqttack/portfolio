name: Test & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── detect which paths changed ─────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'open-next.config.ts'
              - 'wrangler.jsonc'
              - 'tsconfig.json'
              - 'biome.json'
            migrations:
              - 'supabase/migrations/**'

  # ── lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ── unit tests ─────────────────────────────────────────────────────────────
  unit:
    name: Unit tests
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test -- --run

  # ── playwright smoke tests ─────────────────────────────────────────────────
  smoke:
    name: Playwright smoke tests
    needs: [lint, unit]
    if: needs.lint.result == 'success' && needs.unit.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: npx playwright test
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── build & deploy ─────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy to Cloudflare Workers
    needs: [changes, smoke]
    if: (needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch') && (needs.smoke.result == 'success' || needs.smoke.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Security audit (runtime deps only)
        run: npm audit --omit=dev --audit-level=critical
      - name: Build
        run: npm run build:worker
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ vars.WORKER_NAME || 'portfolio' }}

  # ── migrations: lint ───────────────────────────────────────────────────────
  lint-migrations:
    name: Lint SQL migrations
    needs: [changes]
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Lint SQL migrations
        run: supabase db lint --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # ── migrations: dry-run ────────────────────────────────────────────────────
  dry-run-migrations:
    name: Dry-run migrations
    needs: [lint-migrations]
    if: needs.lint-migrations.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Dry-run migrations
        run: supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # ── migrations: deploy ─────────────────────────────────────────────────────
  deploy-migrations:
    name: Deploy Supabase migrations
    needs: [dry-run-migrations]
    if: needs.dry-run-migrations.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Push migrations
        run: |
          for i in 1 2 3; do
            supabase db push && break
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
