name: Keep Supabase Alive

on:
  schedule:
    # Runs every 5 days at 08:00 UTC — well inside the 7-day inactivity window
    - cron: '0 8 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping database
    runs-on: ubuntu-latest
    steps:
      - name: Query profile table
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/profile?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Unexpected status $STATUS — check secrets"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
