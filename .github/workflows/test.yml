name: Test

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test -- --run

  build:
    name: Build & dry-run deploy
    needs: [lint, unit]
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build worker
        run: npm run build:worker
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      - name: Check Worker bundle size
        run: |
          HANDLER=".open-next/server-functions/default/handler.mjs"
          if [ ! -f "$HANDLER" ]; then
            echo "handler.mjs not found, skipping size check"
            exit 0
          fi
          RAW_KB=$(( $(wc -c < "$HANDLER") / 1024 ))
          GZ_KB=$(( $(gzip -c "$HANDLER" | wc -c) / 1024 ))
          echo "handler.mjs: ${RAW_KB} KiB uncompressed / ${GZ_KB} KiB gzip"
          # Free plan limit is 3 MiB gzip total upload. handler.mjs at 10 MiB
          # uncompressed is the practical threshold before the total exceeds 3 MiB.
          if [ "$RAW_KB" -gt 10240 ]; then
            echo "❌ Worker bundle too large (${RAW_KB} KiB uncompressed)."
            echo ""
            echo "   Cloudflare Workers free plan has a 3 MiB gzip upload limit."
            echo "   Common cause: @vercel/og / next/og bundles ~1.5 MiB of WASM into the Worker."
            echo ""
            echo "   PATH FORWARD:"
            echo "   1. Upgrade to Cloudflare Workers paid plan (~\$5/mo, limit rises to 10 MiB):"
            echo "      https://dash.cloudflare.com -> Workers & Pages -> your account -> Plans"
            echo "   2. Once upgraded, remove the 'Check Worker bundle size' step from"
            echo "      .github/workflows/test.yml (or raise the threshold to 102400 KiB)."
            echo "   3. Restore opengraph-image.tsx files from git history:"
            echo "      git show HEAD~1:src/app/opengraph-image.tsx"
            echo "      git show HEAD~1:src/app/\(public\)/projects/\[slug\]/opengraph-image.tsx"
            echo "      git show HEAD~1:src/app/\(public\)/writing/\[slug\]/opengraph-image.tsx"
            exit 1
          fi
          echo "✅ Bundle size OK (${RAW_KB} KiB / 10240 KiB proxy limit)"
      - name: Dry-run deploy
        env:
          WORKER_NAME: ${{ vars.WORKER_NAME || 'portfolio' }}
        run: npx wrangler deploy --dry-run --name "$WORKER_NAME"

  smoke:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    # Dependabot PRs don't get repository secrets, so next dev can't start.
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: npx playwright test
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
